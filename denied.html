<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="shortcut icon" href="assets/favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text Boss — Access Denied</title>
  <style>
    :root {
      --bg:      #020203;
      --surface: #0c0e11;
      --line:    #191d22;
      --line-hi: #232830;
      --text:    #e4ecf2;
      --muted:   #52606d;
      --muted-hi:#8896a4;
      --danger:  #ff5a7a;
      --mono: Consolas, Monaco, 'Courier New', ui-monospace, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse 60% 30% at 50% 0%,
        rgba(255,90,122,.05), transparent);
    }

    .wordmark {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .card {
      width: min(100%, 480px);
      border: 1px solid var(--line-hi);
      border-radius: 20px;
      background: var(--surface);
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55);
    }

    .card-label {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--danger);
      margin-bottom: 16px;
      font-weight: 700;
    }

    h1 { font-size: clamp(18px, 4vw, 22px); margin-bottom: 12px; }

    p {
      font-size: 13px;
      color: var(--muted-hi);
      line-height: 1.7;
      margin-bottom: 10px;
    }
    p:last-of-type { margin-bottom: 24px; }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 10px;
      border: 1px solid var(--line-hi);
      color: var(--text);
      background: rgba(0,0,0,.2);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      transition: border-color .15s;
    }
    a.btn:hover { border-color: rgba(255,255,255,.2); }

    .back-link {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      font-family: var(--mono);
    }
    .back-link:hover { color: var(--text); }

    @media (max-width: 400px) {
      body { padding: 16px; }
      .card { padding: 24px 18px; }
      a.btn { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="wordmark">Text Boss</div>

  <div class="card">
    <div class="card-label">// access denied</div>
    <h1>Session invalid.</h1>
    <p>Your current session does not have access to this Text Boss tier.</p>
    <p>Use the subscription email linked to an active plan, or re-verify if your session has expired.</p>
    <a class="btn" href="/access.html">Return to access check</a>
  </div>

  <a class="back-link" href="/index.html">← Back to pricing</a>

</body>
</html>
