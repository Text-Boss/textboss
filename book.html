<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book an Appointment</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#020203;--surface:#0a0b0d;--border:#1a1c22;--text:#e4ecf2;--text-dim:#7a8694;--accent:#3b82f6;--accent-hover:#2563eb;--danger:#ef4444;--radius:8px;--mono:'SF Mono','Fira Code','Fira Mono','Roboto Mono',monospace}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.6}
  .page{display:flex;flex-direction:column;min-height:100vh;max-width:640px;margin:0 auto;padding:16px}

  /* Header */
  .biz-header{padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;display:flex;align-items:center;gap:16px}
  .biz-avatar{width:56px;height:56px;border-radius:50%;background:#1a1c22;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text-dim);border:1px solid var(--border)}
  .biz-avatar img{width:100%;height:100%;object-fit:cover}
  .biz-info{display:flex;flex-direction:column;gap:2px}
  .biz-name{font-size:17px;font-weight:600;color:var(--text)}
  .biz-occ{font-size:12px;color:var(--text-dim);margin-top:2px}
  .biz-city{font-size:12px;color:var(--text-dim)}

  /* Services */
  .services-list{margin-bottom:16px}
  .services-title{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:8px}
  .svc-chip{display:inline-flex;align-items:baseline;gap:6px;padding:6px 12px;margin:0 6px 6px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:border-color 0.15s}
  .svc-chip:hover{border-color:var(--accent)}
  .svc-meta{color:var(--text-dim);font-size:11px}

  /* Chat */
  .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:85%;padding:10px 14px;border-radius:var(--radius);font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff}
  .msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
  .msg.system{align-self:center;color:var(--text-dim);font-size:12px;font-style:italic}

  /* Input */
  .input-row{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border)}
  .input-row textarea{flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-family:var(--mono);font-size:13px;resize:none;min-height:42px;max-height:120px;outline:none}
  .input-row textarea:focus{border-color:var(--accent)}
  .input-row button{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:0 20px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer}
  .input-row button:hover{background:var(--accent-hover)}
  .input-row button:disabled{opacity:0.5;cursor:not-allowed}

  /* Booking confirmation */
  .booking-confirm{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:16px;margin:8px 0}
  .booking-confirm h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--accent)}
  .booking-detail{font-size:13px;color:var(--text-dim);margin-bottom:4px}
  .cal-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .ics-btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
  .ics-btn:hover{background:var(--accent-hover)}
  .ics-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
  .ics-btn.secondary:hover{border-color:var(--accent)}

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--text-dim);font-size:13px}
  .error-msg{color:var(--danger);text-align:center;padding:32px;font-size:14px}

  /* Footer */
  .footer{padding:16px 0;text-align:center;border-top:1px solid var(--border);margin-top:auto}
  .footer a{color:var(--text-dim);font-size:11px;text-decoration:none}
  .footer a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="page" id="app">
  <div class="loading" id="loading">Loading...</div>
</div>

<script>
(function () {
  'use strict';

  var slug = new URLSearchParams(window.location.search).get('owner') || '';
  var conversation = [];
  var busy = false;
  var bookingData = null;

  var API = '/.netlify/functions/public-booking';

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function addMessage(role, text) {
    var container = document.getElementById('messages');
    if (!container) return;
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function buildGoogleCalUrl(booking) {
    // Format: YYYYMMDDTHHMMSS (local, no Z)
    var datePart = booking.date.replace(/-/g, '');
    var timePart = (booking.time || '00:00').replace(':', '') + '00';
    var start = datePart + 'T' + timePart;
    // Calculate end time
    var startMs = new Date(booking.date + 'T' + (booking.time || '00:00') + ':00').getTime();
    var endMs = startMs + (booking.duration || 60) * 60 * 1000;
    var endDate = new Date(endMs);
    var endPart = endDate.getFullYear() +
      String(endDate.getMonth() + 1).padStart(2, '0') +
      String(endDate.getDate()).padStart(2, '0') + 'T' +
      String(endDate.getHours()).padStart(2, '0') +
      String(endDate.getMinutes()).padStart(2, '0') + '00';
    var params = new URLSearchParams({
      action: 'TEMPLATE',
      text: booking.title || 'Appointment',
      dates: start + '/' + endPart,
    });
    return 'https://calendar.google.com/calendar/render?' + params.toString();
  }

  function renderBookingCard(booking) {
    var container = document.getElementById('messages');
    if (!container) return;
    var card = document.createElement('div');
    card.className = 'booking-confirm';

    var heading = document.createElement('h3');
    heading.textContent = 'Booking Confirmed';
    card.appendChild(heading);

    var d1 = document.createElement('div');
    d1.className = 'booking-detail';
    d1.textContent = booking.title || 'Appointment';
    card.appendChild(d1);

    var d2 = document.createElement('div');
    d2.className = 'booking-detail';
    d2.textContent = (booking.date || '') + ' at ' + (booking.time || '');
    card.appendChild(d2);

    var d3 = document.createElement('div');
    d3.className = 'booking-detail';
    d3.textContent = (booking.duration || 60) + ' minutes';
    card.appendChild(d3);

    if (booking.icsData) {
      var btns = document.createElement('div');
      btns.className = 'cal-btns';

      // Google Calendar
      var gcal = document.createElement('a');
      gcal.className = 'ics-btn';
      gcal.href = buildGoogleCalUrl(booking);
      gcal.target = '_blank';
      gcal.rel = 'noopener';
      gcal.textContent = 'Add to Google Calendar';
      btns.appendChild(gcal);

      // Apple / Outlook (.ics download)
      var blob = new Blob([booking.icsData], { type: 'text/calendar' });
      var url = URL.createObjectURL(blob);
      var apple = document.createElement('a');
      apple.className = 'ics-btn secondary';
      apple.href = url;
      apple.download = 'appointment.ics';
      apple.textContent = 'Add to Apple / Outlook Calendar';
      btns.appendChild(apple);

      card.appendChild(btns);
    }

    container.appendChild(card);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage(text) {
    if (busy || !text.trim()) return;
    busy = true;

    var sendBtn = document.getElementById('send-btn');
    if (sendBtn) sendBtn.disabled = true;

    addMessage('user', text);

    // Add to conversation history
    conversation.push({
      role: 'user',
      content: [{ type: 'input_text', text: text }]
    });

    try {
      var res = await fetch(API, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          slug: slug,
          message: text,
          conversation: conversation.slice(0, -1) // history before this message
        })
      });

      var data = await res.json();

      if (!data.ok) {
        addMessage('system', data.reason || 'Something went wrong.');
      } else {
        if (data.output) {
          addMessage('assistant', data.output);
          conversation.push({
            role: 'assistant',
            content: [{ type: 'output_text', text: data.output }]
          });
        }

        if (data.booking) {
          bookingData = data.booking;
          renderBookingCard(data.booking);
        }
      }
    } catch (err) {
      addMessage('system', 'Connection error. Please try again.');
    }

    busy = false;
    if (sendBtn) sendBtn.disabled = false;
  }

  function renderApp(profile) {
    var app = document.getElementById('app');
    app.innerHTML = '';

    // Header
    var header = document.createElement('div');
    header.className = 'biz-header';

    // Avatar
    var avatarEl = document.createElement('div');
    avatarEl.className = 'biz-avatar';
    if (profile.avatarData) {
      var img = document.createElement('img');
      img.src = profile.avatarData;
      img.alt = 'Business photo';
      avatarEl.appendChild(img);
    } else {
      var initials = (profile.businessName || profile.ownerName || 'B').charAt(0).toUpperCase();
      avatarEl.textContent = initials;
    }
    header.appendChild(avatarEl);

    // Info block
    var infoEl = document.createElement('div');
    infoEl.className = 'biz-info';

    var nameEl = document.createElement('div');
    nameEl.className = 'biz-name';
    nameEl.textContent = profile.businessName || profile.ownerName || 'Book an Appointment';
    infoEl.appendChild(nameEl);

    if (profile.occupation) {
      var occEl = document.createElement('div');
      occEl.className = 'biz-occ';
      occEl.textContent = profile.occupation;
      infoEl.appendChild(occEl);
    }

    if (profile.city) {
      var cityEl = document.createElement('div');
      cityEl.className = 'biz-city';
      cityEl.textContent = profile.city;
      infoEl.appendChild(cityEl);
    }

    header.appendChild(infoEl);
    app.appendChild(header);

    // Services
    if (profile.services && profile.services.length > 0) {
      var svcSection = document.createElement('div');
      svcSection.className = 'services-list';
      var svcTitle = document.createElement('div');
      svcTitle.className = 'services-title';
      svcTitle.textContent = 'Select a service';
      svcSection.appendChild(svcTitle);

      profile.services.forEach(function (svc) {
        var chip = document.createElement('span');
        chip.className = 'svc-chip';

        var label = document.createElement('span');
        label.textContent = svc.title;
        chip.appendChild(label);

        var metaParts = [];
        if (svc.duration_min) metaParts.push(svc.duration_min + ' min');
        if (svc.price != null) metaParts.push('$' + Number(svc.price).toFixed(0));
        if (metaParts.length > 0) {
          var meta = document.createElement('span');
          meta.className = 'svc-meta';
          meta.textContent = metaParts.join(' · ');
          chip.appendChild(meta);
        }

        chip.addEventListener('click', function () {
          var ta = document.getElementById('chat-input');
          if (ta) {
            ta.value = "I'd like to book a " + svc.title + ' (service_id: ' + svc.id + ')';
            ta.focus();
          }
        });
        svcSection.appendChild(chip);
      });
      app.appendChild(svcSection);
    }

    // Chat area
    var chatArea = document.createElement('div');
    chatArea.className = 'chat-area';

    var messages = document.createElement('div');
    messages.className = 'messages';
    messages.id = 'messages';
    chatArea.appendChild(messages);

    var inputRow = document.createElement('div');
    inputRow.className = 'input-row';
    var textarea = document.createElement('textarea');
    textarea.id = 'chat-input';
    textarea.placeholder = 'Type a message...';
    textarea.rows = 1;
    textarea.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        var val = textarea.value.trim();
        if (val) { textarea.value = ''; sendMessage(val); }
      }
    });
    inputRow.appendChild(textarea);

    var sendBtn = document.createElement('button');
    sendBtn.id = 'send-btn';
    sendBtn.textContent = 'Send';
    sendBtn.addEventListener('click', function () {
      var val = textarea.value.trim();
      if (val) { textarea.value = ''; sendMessage(val); }
    });
    inputRow.appendChild(sendBtn);
    chatArea.appendChild(inputRow);
    app.appendChild(chatArea);

    // Footer
    var footer = document.createElement('div');
    footer.className = 'footer';
    var link = document.createElement('a');
    link.href = 'https://textboss.com.au';
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = 'Powered by Text Boss';
    footer.appendChild(link);
    app.appendChild(footer);

    // Welcome message
    var bizDisplay = profile.businessName || profile.ownerName || null;
    var welcome = bizDisplay
      ? 'Hi! You can book an appointment with ' + bizDisplay + ' right here. Select a service above to get started, or just tell me what you need.'
      : 'Hi! Select a service above to get started, or tell me what you\'d like to book.';
    addMessage('assistant', welcome);
  }

  function renderError(message) {
    var app = document.getElementById('app');
    app.innerHTML = '<div class="error-msg">' + escapeHtml(message) + '</div>' +
      '<div class="footer"><a href="https://textboss.com.au" target="_blank" rel="noopener">Powered by Text Boss</a></div>';
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  async function init() {
    if (!slug) {
      renderError('No booking page found. Check the link and try again.');
      return;
    }

    try {
      var res = await fetch(API, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ slug: slug, message: '__init__' })
      });

      var data = await res.json();

      if (!data.ok) {
        renderError('This booking page is not available.');
        return;
      }

      renderApp(data);
    } catch (err) {
      renderError('Unable to load booking page. Please try again later.');
    }
  }

  init();
})();
</script>
</body>
</html>
