[build]
  publish = "."
  functions = "netlify/functions"

[dev]
  framework = "#static"
  port = 8888
  publish = "."
  functions = "netlify/functions"
  autoLaunch = false

# Run send-reminders every hour to check for appointments within the next 24h
[functions."send-reminders"]
  schedule = "0 * * * *"

# Run send-follow-ups daily at 9am UTC to notify owners of due follow-up messages
[functions."send-follow-ups"]
  schedule = "0 9 * * *"

# Run send-todo-reminders every 15 minutes to deliver due to-do alerts
[functions."send-todo-reminders"]
  schedule = "*/15 * * * *"
