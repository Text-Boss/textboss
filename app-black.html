<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text Boss · Black</title>
  <style>
    :root {
      --bg:       #020203;
      --surface:  #0c0e11;
      --panel:    #0f1216;
      --line:     #191d22;
      --line-hi:  #232830;
      --text:     #e4ecf2;
      --muted:    #52606d;
      --accent:   #a78bfa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.6 Consolas, Monaco, monospace;
    }

    body {
      background-image:
        radial-gradient(ellipse 70% 35% at 50% 0%,
          color-mix(in srgb, var(--accent) 8%, transparent),
          transparent);
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(2,2,3,.88);
      backdrop-filter: blur(10px);
    }

    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      color: #0a0612;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -.5px;
      flex-shrink: 0;
      user-select: none;
    }

    .app-wordmark {
      flex: 1;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .app-wordmark span {
      color: var(--accent);
    }

    .app-tier-badge {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--line-hi);
      border-radius: 6px;
      padding: 3px 9px;
    }

    /* ── Sidebar ── */
    .sidebar-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--line-hi);
      background: var(--panel);
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }

    .sidebar-toggle:hover { background: #181c22; border-color: #2e3540; }

    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .threads-sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: margin-left .2s ease;
      margin-left: -260px;
    }

    .threads-sidebar.open {
      margin-left: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .sidebar-header span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sidebar-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line-hi);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
    }

    .sidebar-close:hover { background: var(--panel); }

    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 10px 14px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line-hi);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }

    .new-chat-btn:hover { background: #181c22; }

    .threads-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .threads-list::-webkit-scrollbar { width: 3px; }
    .threads-list::-webkit-scrollbar-thumb { background: var(--line-hi); border-radius: 3px; }

    .thread-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: background .1s;
      border-left: 2px solid transparent;
    }

    .thread-item:hover { background: var(--panel); }
    .thread-item.active { background: var(--panel); border-left-color: var(--accent); }

    .thread-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-time {
      font-size: 10px;
      color: var(--muted);
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Thread ── */
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .chat-thread:empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin: auto;
      opacity: .55;
      line-height: 2;
    }

    .chat-thread::-webkit-scrollbar { width: 4px; }
    .chat-thread::-webkit-scrollbar-track { background: transparent; }
    .chat-thread::-webkit-scrollbar-thumb {
      background: var(--line-hi);
      border-radius: 4px;
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-width: min(78%, 680px);
    }

    .msg-user { align-self: flex-end; align-items: flex-end; }
    .msg-ai   { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .msg-user .msg-label { color: var(--muted); }
    .msg-ai   .msg-label { color: var(--accent); }

    .msg-text {
      white-space: pre-wrap;
      word-break: break-word;
      padding: 13px 17px;
      font-size: 14px;
      line-height: 1.7;
    }

    .msg-user .msg-text {
      background: var(--panel);
      border: 1px solid var(--line-hi);
      border-radius: 14px 14px 4px 14px;
      color: var(--text);
    }

    .msg-ai .msg-text {
      background: color-mix(in srgb, var(--accent) 6%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 16%, transparent);
      border-radius: 14px 14px 14px 4px;
      color: var(--text);
    }

    /* ── Footer ── */
    .app-footer {
      flex-shrink: 0;
      border-top: 1px solid var(--line);
      padding: 16px 24px 20px;
      background: rgba(2,2,3,.92);
      backdrop-filter: blur(10px);
    }

    textarea {
      width: 100%;
      min-height: 72px;
      max-height: 200px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line-hi);
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      resize: none;
      outline: none;
      caret-color: var(--accent);
      transition: border-color .15s;
    }

    textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }

    textarea::placeholder { color: var(--muted); }

    .footer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button.primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #0a0612;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s;
    }

    button.primary-btn:hover { filter: brightness(1.08); }

    button.secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 9px;
      border: 1px solid var(--line-hi);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    button.secondary-btn:hover { background: #181c22; border-color: #2e3540; }

    #app-status {
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .04em;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      opacity: .5;
    }

    /* ── Copy button ── */
    .copy-btn {
      background: none;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--muted);
      cursor: pointer;
      font: inherit; font-size: 11px; letter-spacing: .05em;
      min-height: 0; padding: 3px 9px; margin-top: 4px;
      opacity: 0;
      transition: opacity .12s, color .12s, border-color .12s;
    }
    .msg-ai:hover .copy-btn,
    .msg-ai:focus-within .copy-btn { opacity: 1; }
    .copy-btn:hover {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    }
    @media (hover: none) { .copy-btn { opacity: 1; } }

    /* ── Typing indicator ── */
    .msg-typing .msg-text {
      padding: 14px 18px;
      display: flex; align-items: center; gap: 5px;
    }
    .tdot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--muted);
      animation: tdot 1.4s ease-in-out infinite;
    }
    .tdot:nth-child(2) { animation-delay: .2s; }
    .tdot:nth-child(3) { animation-delay: .4s; }
    @keyframes tdot {
      0%, 60%, 100% { opacity: .2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* ── Char count ── */
    .char-count { font-size: 11px; color: var(--muted); }
    .char-count.warn { color: #f59e0b; }

    /* ── Sidebar backdrop (mobile) ── */
    .sidebar-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 49;
    }
    .sidebar-backdrop.visible { display: block; }

    @media (max-width: 820px) {
      .threads-sidebar {
        position: absolute;
        top: 0; left: 0; bottom: 0;
        z-index: 50;
        margin-left: -260px;
      }
      .threads-sidebar.open { margin-left: 0; }
    }

    @media (max-width: 640px) {
      .app-header { padding: 12px 16px; gap: 10px; flex-wrap: wrap; }
      .app-wordmark { font-size: 12px; min-width: 0; }
      .app-tier-badge { display: none; }
      .chat-thread { padding: 20px 16px; }
      .msg { max-width: min(90%, 680px); }
      .app-footer { padding: 12px 16px 16px; }
      textarea { min-height: 60px; padding: 10px 12px; font-size: 16px; }
      .hint { display: none; }
    }
    @media (max-width: 400px) {
      .app-header { padding: 10px 10px; gap: 8px; }
      .app-wordmark { font-size: 11px; letter-spacing: .08em; }
      .chat-thread { padding: 14px 10px; gap: 16px; }
      .msg { max-width: 95%; }
      .msg-text { padding: 10px 13px; font-size: 13px; }
      .app-footer { padding: 10px 10px 14px; }
      .footer-row { gap: 8px; }
      button.primary-btn, button.secondary-btn { font-size: 13px; padding: 0 14px; }
    }
  </style>
</head>
<body>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>
  <div class="app" data-app-tier="Black" data-input-limit="8000">

    <header class="app-header">
      <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Toggle threads">&#9776;</button>
      <div class="app-logo">TB</div>
      <div class="app-wordmark">Text Boss <span>Black</span></div>
      <div class="app-tier-badge">Black</div>
      <button class="secondary-btn" id="logout-button" type="button">Logout</button>
    </header>

    <div class="app-body">
      <aside class="threads-sidebar" id="threads-sidebar">
        <div class="sidebar-header">
          <span>Threads</span>
          <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Close sidebar">&#10005;</button>
        </div>
        <button class="new-chat-btn" id="new-chat-button" type="button">+ New Chat</button>
        <div class="threads-list" id="threads-list"></div>
      </aside>

      <div class="chat-area">
        <div
          class="chat-thread"
          id="app-output"
          data-placeholder="Describe the situation and what's at stake — every word will be chosen for defensibility."
        ></div>

        <footer class="app-footer">
          <form id="chat-form">
            <textarea
              id="chat-message"
              placeholder="Client is threatening to dispute the charge. The project was completed per the agreed scope…"
              rows="3"
            ></textarea>
            <div class="footer-row">
              <button class="primary-btn" type="submit">Generate</button>
              <span id="app-status" aria-live="polite">Checking session…</span>
              <span id="char-count" class="char-count"></span>
            </div>
          </form>
          <p class="hint">Enter to send &middot; Shift+Enter for new line &middot; Every word is chosen for defensibility.</p>
        </footer>
      </div>
    </div>

  </div>
  <script src="/app-client.js"></script>
</body>
</html>
